trigger:
- main

pool:
  name: Default

stages:

# ================= CI STAGE =================
- stage: Build
  displayName: Build Stage
  jobs:
  - job: BuildJob
    steps:

    # ✅ Force exact SDK version (IMPORTANT)
    - task: UseDotNet@2
      displayName: Install .NET SDK
      inputs:
        packageType: 'sdk'
        version: '8.0.204'   # or match EXACT version you use locally
        installationPath: $(Agent.ToolsDirectory)/dotnet

    # ✅ Debug step (optional but useful)
    - script: dotnet --version
      displayName: Check .NET Version

    # ✅ Clean temp space (fix disk warning)
    - script: |
        echo "Cleaning temp space..."
        rm -rf $(Agent.TempDirectory)/*
      displayName: Clean Temp Directory

    # Restore
    - script: dotnet restore WebAppLab.csproj
      displayName: Restore

    # Build
    - script: dotnet build WebAppLab.csproj --configuration Release --no-restore
      displayName: Build

    # Publish
    - script: dotnet publish WebAppLab.csproj -c Release -o $(Build.ArtifactStagingDirectory) --no-build
      displayName: Publish

    # Publish artifact
    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)'
        artifactName: 'drop'

# ================= CD STAGE =================
- stage: Deploy
  displayName: Deploy Stage
  dependsOn: Build
  condition: succeeded()

  jobs:
  - job: DeployJob
    steps:
    - script: echo "Deploying application..."
      displayName: Deploy (Placeholder)