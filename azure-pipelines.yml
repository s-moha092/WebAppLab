trigger:
- main

pool:
  name: Default

stages:

# ================= CI STAGE =================
- stage: Build
  displayName: Build Stage
  jobs:
  - job: BuildJob
    steps:
    - task: UseDotNet@2
      inputs:
        packageType: 'sdk'
        version: '8.x'

    # Restore using explicit project file
    - script: dotnet restore WebAppLab.csproj
      displayName: Restore

    # Build using explicit project file
    - script: dotnet build WebAppLab.csproj --configuration Release
      displayName: Build

    # Publish using explicit project file
    - script: dotnet publish WebAppLab.csproj -c Release -o $(Build.ArtifactStagingDirectory)
      displayName: Publish

    # Publish artifact
    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)'
        artifactName: 'drop'

# ================= CD STAGE =================
- stage: Deploy
  displayName: Deploy Stage
  dependsOn: Build
  condition: succeeded()

  jobs:
  - job: DeployJob
    steps:
    - script: echo "Deploying application..."
      displayName: Deploy (Placeholder)